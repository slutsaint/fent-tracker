<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>fent — JEE 2027</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* True Minimal OLED Theme */
  --bg:#000000;
  --s1:#0a0a0c;
  --s2:#121214;
  --s3:#1a1a1e;
  
  /* Delicate Borders */
  --b1:rgba(255,255,255,0.06);
  --b2:rgba(255,255,255,0.12);
  
  /* Softened, Legible Typography */
  --t1:#e4e4e7; /* Primary Text */
  --t2:#a1a1aa; /* Secondary */
  --t3:#71717a; /* Tertiary - Muted but readable */
  
  /* Minimal Accents */
  --m:#c2a359; 
  --c:#6b9e83; 
  --p:#908bb0; 
  --red:#c46464;
  --done:#6b9e83;
  
  --r:8px; /* Sharp, precise corners */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}
body{background:var(--bg);color:var(--t1);font-family:'Inter', sans-serif;min-height:100vh;font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* Ultra-light grain */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-2px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(1)}40%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes tabSlide{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes modalIn{from{opacity:0;transform:translateY(10px) scale(0.99)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cbtRowIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes cbtShimmer{0%{left:-70%}100%{left:130%}}
@keyframes cbtGlowPulse{0%,100%{opacity:0.5}50%{opacity:1}}

.shell{max-width:700px;margin:0 auto;padding:48px 24px 120px;animation:fadeUp .6s var(--ease) backwards}

/* ─── TOP HEADER ─── */
.top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:48px;gap:16px;flex-wrap:wrap}
.brand-eye{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--t3);margin-bottom:6px;font-weight:400;}
.brand-name{font-size:28px;font-weight:400;letter-spacing:-.03em;color:var(--t1)}
.brand-name span{color:var(--t3);font-weight:300}
.master-side{text-align:right}
.mpct{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:300;letter-spacing:-.04em;line-height:1;color:var(--t1);}
.mlbl{font-size:9px;color:var(--t2);letter-spacing:.1em;margin-top:8px;font-weight:500;text-transform:uppercase;}

/* ─── TABS ─── */
.tabs{display:flex;gap:0;margin-bottom:32px;border-bottom:1px solid var(--b1);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{font-size:12px;font-weight:400;padding:12px 20px 12px 0;border:none;background:transparent;color:var(--t3);cursor:pointer;transition:color .3s;letter-spacing:.02em;position:relative;white-space:nowrap;flex-shrink:0;}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--t1)}
.tab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:20px;height:1px;background:var(--t1);transform-origin:left;animation:tabSlide .3s var(--ease) backwards}
.tbadge{font-size:10px;margin-left:6px;opacity:.4;font-weight:300;transition:opacity .3s; font-family:'JetBrains Mono',monospace;}
.tab.on .tbadge{opacity:.8}

/* ─── PANELS ─── */
.panel{display:none;animation:fadeUp .4s var(--ease) backwards}
.panel.on{display:block}

/* ─── SECTION HEADERS ─── */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sh-lbl, .ana-title{
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--t2);
}
.sh-val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3); font-weight:300;}

/* ─── FILTERS (Minimal redesign) ─── */
.frow{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.fb{font-size:11px;font-weight:400;padding:4px 0;border:none;background:transparent;color:var(--t3);cursor:pointer;letter-spacing:.02em;transition:all .2s; border-bottom:1px solid transparent}
.fb:hover{color:var(--t2)}
.fb.on{color:var(--t1); border-bottom:1px solid var(--t1)}
.fs{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);border:1px solid var(--b1);border-radius:4px;padding:6px 12px;color:var(--t1);outline:none;margin-left:auto;transition:all .2s; font-weight:300;}
.fs::placeholder{color:var(--t3)}
.fs:focus{border-color:var(--b2);background:var(--s1)}

/* ─── CHAPTER LIST ─── */
.cl{display:flex;flex-direction:column;gap:4px}
.ch{background:var(--s1);border-radius:var(--r);overflow:hidden;transition:all .2s var(--ease);border:1px solid var(--b1)}
.ch:hover{border-color:var(--b2);background:var(--s2)}
.ch.open{border-color:var(--b2);background:var(--s2)}
.ch-hd{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;}
.ch-n{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);width:20px;text-align:right;flex-shrink:0; font-weight:300;}
.ch-nm{flex:1;font-size:13px;font-weight:400;color:var(--t1);letter-spacing:-.01em;}
.ch-dt{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);white-space:nowrap; font-weight:300;}
.ch-ct{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);width:28px;text-align:right; font-weight:300;}
.ch-ar{color:var(--t3);font-size:8px;margin-left:4px;transition:transform .3s var(--ease);flex-shrink:0}
.ch.open .ch-ar{transform:rotate(180deg)}
.ch.done-ch .ch-nm{color:var(--t3);text-decoration:line-through;}
.ch.done-ch .ch-ct{color:var(--done)}
.ch{animation:cardIn .4s var(--ease) backwards}

/* ─── TASK GRID ─── */
.tg{display:none;padding:2px 16px 16px;grid-template-columns:1fr 1fr}
.ch.open .tg{display:grid;gap:6px;animation:slideDown .3s var(--ease) backwards}
.tk{display:flex;align-items:center;gap:10px;padding:10px 12px;background:transparent;border-radius:6px;cursor:pointer;transition:all .2s;border:1px solid var(--b1)}
.tk:hover{background:var(--s2); border-color:var(--b2)}
.tk.on{background:var(--s3);border-color:transparent}
.tb{width:12px;height:12px;border-radius:3px;border:1px solid var(--t3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;transition:all .2s var(--ease)}

/* Dynamic Box Colors */
.tk.on[data-s="math"] .tb{border-color:var(--m);background:var(--m);color:var(--bg)}
.tk.on[data-s="chem"] .tb{border-color:var(--c);background:var(--c);color:var(--bg)}
.tk.on[data-s="phys"] .tb{border-color:var(--p);background:var(--p);color:var(--bg)}

.tb.popping{animation:checkPop .3s var(--ease) both}
.tl{font-size:12px;color:var(--t2);font-weight:400;}
.tk.on .tl{color:var(--t1)}

/* ─── OVERVIEW TAB ─── */
.pulse-header{margin-bottom:24px}
.pulse-window-label{font-size:10px;font-weight:500;color:var(--t2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.pulse-window-range{font-size:18px;font-weight:400;letter-spacing:-.02em;color:var(--t1);line-height:1.2}
.pulse-box{background:var(--s1);border-radius:var(--r);border:1px solid var(--b1);overflow:hidden;animation:fadeUp .4s var(--ease) backwards}
.pulse-box-head{padding:16px 20px;border-bottom:1px solid var(--b1);display:flex;flex-direction:column;gap:12px}

/* Weekly Progress Bar */
.ovw-progress-wrap{display:flex; align-items:center; gap:14px; width:100%;}
.ovw-progress-bar{flex:1; height:3px; background:var(--s3); border-radius:99px; overflow:visible; position:relative;}
.ovw-progress-fill{
  height:100%; 
  background: linear-gradient(90deg, rgba(161,161,170,0.5) 0%, var(--t1) 100%);
  border-radius:99px; 
  transition: width 1.1s cubic-bezier(0.16,1,0.3,1);
  position:relative;
  box-shadow: 0 0 8px rgba(228,228,231,0.18);
}
.ovw-progress-fill::after{
  content:'';
  position:absolute;
  right:-1px; top:50%;
  transform:translateY(-50%);
  width:5px; height:5px;
  background:var(--t1);
  border-radius:50%;
  box-shadow:0 0 6px rgba(228,228,231,0.5);
  opacity:0;
  transition:opacity 0.4s ease;
}
.ovw-progress-fill.has-progress::after{ opacity:1; }
.ovw-progress-text{font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--t1); font-weight:300; width:30px; text-align:right; letter-spacing:.02em;}

.pulse-box-title{font-size:12px;font-weight:400;letter-spacing:.02em;color:var(--t1);}
.pulse-content{padding:20px}
.pulse-section{margin-bottom:28px}
.pulse-section:last-child{margin-bottom:0}

/* Interactive Overview Chapters */
.pulse-item-expandable{flex-direction:column;align-items:stretch;padding:0;background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;cursor:default; transition:all .2s var(--ease)}
.pulse-item-expandable:hover{border-color:var(--b2);}
.pulse-item-hd{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;transition:background .2s;user-select:none}
.pulse-item-hd:hover{background:var(--s2)}
.pulse-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0}
.pulse-dot.m{background:var(--m)}.pulse-dot.c{background:var(--c)}.pulse-dot.ph{background:var(--p)}.pulse-dot.test{background:var(--red)}
.pulse-item-name{flex:1;font-size:13px;font-weight:400;color:var(--t1);letter-spacing:-.01em}
.pulse-item-dates{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);white-space:nowrap; font-weight:300;}
.pulse-item-tag{font-weight:400;font-size:9px;padding:2px 6px;border-radius:4px;letter-spacing:.05em;flex-shrink:0;background:var(--s3);color:var(--t2); border:1px solid var(--b1);}
.pulse-progress{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-left:6px; width:24px; text-align:right; font-weight:300;}
.pulse-progress.done{color:var(--done)}
.pulse-item-arrow{font-size:8px;color:var(--t3);margin-left:4px;transition:transform .3s var(--ease);flex-shrink:0}

.pulse-tasks-wrap {display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.2s var(--ease); background:var(--s1);}
.pulse-tasks-wrap.open {grid-template-rows: 1fr;}
.pulse-tasks-inner {overflow: hidden;}
.pulse-tasks-wrap .tg {display:grid; gap:6px; padding: 2px 16px 16px;} 

.pulse-nav{display:flex;gap:8px;margin-bottom:20px;align-items:center;justify-content:space-between}
.pulse-nav-btn{font-weight:400;font-size:10px;padding:8px 14px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;transition:all .2s;letter-spacing:.05em; text-transform:uppercase;}
.pulse-nav-btn:hover{border-color:var(--b2);color:var(--t1); background:var(--s1);}
.pulse-nav-center{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);letter-spacing:.05em; font-weight:300;}
.pulse-empty-note{font-size:11px;font-weight:400;color:var(--t3);text-align:center;padding:24px 0;}

/* Pulse Test Rows */
.pulse-test-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg);border-radius:var(--r);margin-bottom:6px; border:1px solid var(--b1)}
.pulse-t-name{flex:1;font-size:13px;font-weight:400;color:var(--t1);letter-spacing:-.01em}
.pulse-t-tag{font-weight:400;font-size:9px;padding:4px 10px;border-radius:4px; letter-spacing:.05em; background:var(--s3);color:var(--t2); cursor:pointer; transition:all .2s; border:1px solid var(--b1); text-transform:uppercase;}
.pulse-t-tag:hover{background:var(--t1); color:var(--bg);}
.pulse-t-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3); font-weight:300;}

/* ─── TESTS TAB ─── */
.test-group{margin-bottom:32px}
.test-group-label{margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--b1); font-size:10px; font-weight:500; color:var(--t2); text-transform:uppercase; letter-spacing:0.1em;}
.test-list{display:flex;flex-direction:column;gap:4px}
.test-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--s1);border-radius:var(--r);transition:all .2s var(--ease);border:1px solid var(--b1);cursor:pointer;animation:cardIn .3s var(--ease) backwards}
.test-item:hover{background:var(--s2);border-color:var(--b2);}
.test-item.done-test{background:var(--bg); opacity:0.6; cursor:default; pointer-events:none}
.test-dot.mains{background:var(--red)}
.test-dot.adv{background:#ff8888}
.test-name{flex:1;font-size:13px;font-weight:400;color:var(--t1);letter-spacing:-.01em}
.test-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3); font-weight:300;}
.test-type-badge{font-weight:400;font-size:9px;padding:2px 8px;border-radius:4px;letter-spacing:.05em;flex-shrink:0}
.test-type-badge.mains{background:rgba(196,100,100,.1);color:var(--red); border:1px solid rgba(196,100,100,.2)}
.test-type-badge.adv{background:rgba(255,136,136,.1);color:#ff8888; border:1px solid rgba(255,136,136,.2)}
.test-score-badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t1); font-weight:300;}
.pct-good{color:var(--c)}
.pct-mid{color:var(--m)}
.pct-low{color:var(--red)}

/* ─── ANALYTICS (DASHBOARD & LOGS) ─── */
.analytics-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.ana-card{background:var(--s1);border-radius:var(--r);padding:20px;border:1px solid var(--b1);transition:all .2s var(--ease);animation:cardIn .4s var(--ease) backwards}
.ana-card:hover{border-color:var(--b2); background:var(--s2);}
.ana-card.full{grid-column:1/-1}
.ana-big{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:300;letter-spacing:-.04em;color:var(--t1);line-height:1; margin-top:4px;}
.ana-sub{font-size:10px;color:var(--t3);margin-top:6px; letter-spacing:.02em;}

/* task breakdown bars */
.task-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.task-bar-label{font-size:11px;color:var(--t2);width:60px;flex-shrink:0; font-weight:400;}
.task-bar-bg{flex:1;height:2px;background:var(--s3);border-radius:99px;overflow:hidden}
.task-bar-fill{height:100%;border-radius:99px;background:var(--t1);transition:width 1s var(--ease);transform-origin:left}
.task-bar-fill.theory{background:var(--m)}
.task-bar-fill.module{background:var(--c)}
.task-bar-fill.pyq{background:var(--p)}
.task-bar-fill.revision{background:var(--red)}
.task-bar-val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);width:32px;text-align:right;flex-shrink:0; font-weight:300;}

/* ring chart */
.ring-chart-wrap{display:flex;gap:24px;flex-wrap:wrap;margin-top:12px}
.ring-svg{flex-shrink:0; transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--s3);stroke-width:4}
.ring-fill{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s var(--ease);}
.ring-stat-box{display:flex;align-items:center;gap:12px}

/* sparkline */
.sparkline{display:flex;align-items:flex-end;gap:4px;height:40px;margin-top:16px; padding-bottom:4px; border-bottom:1px solid var(--b1)}
.spark-bar{flex:1;border-radius:2px 2px 0 0;background:var(--t3);transition:height .5s var(--ease),background .2s;min-height:2px}
.spark-bar:hover{background:var(--t1)}

/* Deck & Log Lists inside Analytics */
.aly-bottom-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-top:32px;}
.aly-log-sect{display:flex; flex-direction:column;}
.log-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border-radius:var(--r);border:1px solid var(--b1);margin-bottom:4px;}
.log-icon{width:12px;height:12px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px; background:var(--s3); color:var(--done)}
.log-name{flex:1;font-size:12px;color:var(--t2);letter-spacing:-.01em}
.log-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--s3);color:var(--t2);}
.log-empty{font-size:10px; color:var(--t3); font-style:italic; padding:12px 0;}

/* ─── MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;animation:overlayIn .2s var(--ease) both;}
.modal-overlay.hidden{display:none}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:12px;width:90%;max-width:380px;padding:28px;animation:modalIn .3s var(--ease) both;position:relative; box-shadow:0 20px 40px rgba(0,0,0,0.8)}
.modal-title{font-size:15px;font-weight:400;color:var(--t1);letter-spacing:-.01em;margin-bottom:4px}
.modal-sub{font-weight:400;font-size:10px;color:var(--t3);letter-spacing:.05em;margin-bottom:24px;}
.modal-close{position:absolute;top:20px;right:20px;width:24px;height:24px;border-radius:50%;border:1px solid var(--b1);background:transparent;color:var(--t2);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .2s; font-weight:300;}
.modal-close:hover{background:var(--s2);color:var(--t1); border-color:var(--b2)}

/* Minimal Error Box styling for strict validation */
#modalError {
    display: none;
    color: var(--red);
    font-size: 11px;
    margin-bottom: 16px;
    background: rgba(196, 100, 100, 0.08);
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid rgba(196, 100, 100, 0.15);
    font-family: 'Inter', sans-serif;
}

.score-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.score-row{display:flex;align-items:center;gap:12px}
.score-label{font-size:12px;font-weight:400;color:var(--t2);width:70px;flex-shrink:0}
.score-input-wrap{flex:1;position:relative}
.score-input{width:100%;background:var(--bg);border:1px solid var(--b1);border-radius:6px;padding:10px 36px 10px 12px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--t1);outline:none;transition:all .2s; font-weight:300;}
.score-input:focus{border-color:var(--t2);background:var(--s2)}
.score-max{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3); font-weight:300; pointer-events:none;}
.score-total-row{background:var(--s2);border-radius:6px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:24px; border:1px solid var(--b1)}
.score-total-label{font-size:11px;color:var(--t2);font-weight:500;}
.score-total-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:300;color:var(--t1);letter-spacing:-.01em}

.modal-submit{width:100%;padding:12px;background:var(--t1);color:var(--bg);border:none;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;letter-spacing:.02em;transition:all .2s;}
.modal-submit:hover{background:var(--t2);}

/* ─── TOAST ─── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--s2);border:1px solid var(--b2);border-radius:6px;padding:10px 16px;font-size:11px;font-weight:400;color:var(--t1);transform:translateY(20px);opacity:0;transition:all .3s var(--ease);pointer-events:none;z-index:9998;letter-spacing:.02em; box-shadow:0 8px 24px rgba(0,0,0,0.6);}
#toast.show{transform:translateY(0);opacity:1;}

@media(max-width:540px){
  .analytics-grid, .aly-bottom-grid{grid-template-columns:1fr}
  .ana-card.full{grid-column:1}
  .tg{grid-template-columns:1fr}
}

/* ─── NEW ANALYTICS SYSTEM ─── */
@keyframes barGrow{from{width:0}to{width:var(--w)}}
@keyframes dotReveal{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
@keyframes areaFade{from{opacity:0}to{opacity:1}}
@keyframes dashReveal{to{stroke-dashoffset:0}}

.ana-section{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:22px;margin-bottom:14px;transition:border-color .25s;animation:fadeUp .4s var(--ease) backwards;}
.ana-section:hover{border-color:var(--b2);}
.ana-sect-title{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:18px;}

.ana-card-new{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:22px;transition:border-color .25s;animation:fadeUp .4s var(--ease) backwards;}
.ana-card-new:hover{border-color:var(--b2);}
.ana-card-new .ana-sect-title{margin-bottom:10px;}
.ana-big-new{font-family:'JetBrains Mono',monospace;font-size:34px;font-weight:300;letter-spacing:-.04em;color:var(--t1);line-height:1;margin-top:4px;}

.ana-meta-new{font-size:9px;color:var(--t3);margin-top:10px;letter-spacing:.03em;opacity:.65;}
.ana-empty-msg{font-size:11px;color:var(--t3);text-align:center;padding:22px 0;}

/* Subject Progress Bars */
.subj-prog-list{display:flex;flex-direction:column;gap:14px;}
.subj-prog-row{display:flex;align-items:center;gap:14px;}
.subj-prog-meta{display:flex;justify-content:space-between;align-items:baseline;width:130px;flex-shrink:0;}
.subj-prog-name{font-size:12px;color:var(--t1);font-weight:400;letter-spacing:-.01em;}
.subj-prog-frac{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);font-weight:300;}

/* Score Chart */
.score-svg{display:block;width:100%;overflow:visible;margin-top:10px;}
.chart-line-anim{stroke-dasharray:3000;stroke-dashoffset:3000;animation:dashReveal 1.5s cubic-bezier(.16,1,.3,1) forwards;}
.chart-area-anim{animation:areaFade .9s ease .15s both;}
.chart-dot-anim{animation:dotReveal .35s cubic-bezier(.16,1,.3,1) both;}

/* Heatmap */
.heatmap-scroll-wrap{overflow-x:auto;padding-bottom:4px;}

.hm-cell{border-radius:4px;flex-shrink:0;transition:transform .15s,filter .2s;cursor:default;}

.hm-leg-cell{width:13px;height:13px;border-radius:2px;flex-shrink:0;}

/* Tracker / Backlog */
.track-card{border-radius:8px;border:1px solid;padding:18px 20px;display:flex;align-items:center;gap:20px;justify-content:space-between;flex-wrap:wrap;margin-bottom:0;}

.backlog-subj-tag{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--s2);color:var(--t3);letter-spacing:.03em;}

<script>
/* ═══════════════════════════════════════════════

const MATH=[
  {n:1,name:"Quadratic Equations",s:"13 Apr",e:"18 Apr"},{n:2,name:"Complex Numbers",s:"20 Apr",e:"25 Apr"},{n:3,name:"Sequences & Series",s:"27 Apr",e:"02 May"},{n:4,name:"Binomial Theorem",s:"04 May",e:"08 May"},{n:5,name:"Permutations & Combinations",s:"09 May",e:"14 May"},{n:6,name:"Probability",s:"15 May",e:"23 May"},{n:7,name:"Matrices & Determinants",s:"25 May",e:"02 Jun"},{n:8,name:"Trig Ratios & Identities",s:"03 Jun",e:"08 Jun"},{n:9,name:"Inverse Trig Functions",s:"09 Jun",e:"13 Jun"},{n:10,name:"Straight Lines",s:"15 Jun",e:"19 Jun"},{n:11,name:"Circle",s:"20 Jun",e:"26 Jun"},{n:12,name:"Parabola",s:"27 Jun",e:"02 Jul"},{n:13,name:"Ellipse",s:"03 Jul",e:"08 Jul"},{n:14,name:"Hyperbola",s:"09 Jul",e:"14 Jul"},{n:15,name:"Vector Algebra",s:"15 Jul",e:"23 Jul"},{n:16,name:"3D Geometry",s:"24 Jul",e:"01 Aug"},{n:17,name:"Functions",s:"03 Aug",e:"07 Aug"},{n:18,name:"Limits Continuity & Diff.",s:"08 Aug",e:"14 Aug"},{n:19,name:"Differentiation",s:"15 Aug",e:"20 Aug"},{n:20,name:"Application of Derivatives",s:"21 Aug",e:"29 Aug"},{n:21,name:"Indefinite Integration",s:"31 Aug",e:"04 Sep"},{n:22,name:"Definite Integration",s:"05 Sep",e:"14 Sep"},{n:23,name:"Area Under Curves",s:"15 Sep",e:"19 Sep"},{n:24,name:"Differential Equations",s:"21 Sep",e:"25 Sep"},{n:25,name:"Sets & Relations",s:"26 Sep",e:"01 Oct"},{n:26,name:"Statistics",s:"02 Oct",e:"07 Oct"}

const CHEM=[
  {n:1,name:"Some Basic Concepts (Mole)",s:"13 Apr",e:"21 Apr"},{n:2,name:"Atomic Structure",s:"22 Apr",e:"30 Apr"},{n:3,name:"Chemical Bonding",s:"01 May",e:"09 May"},{n:4,name:"Redox Reactions",s:"11 May",e:"15 May"},{n:5,name:"Thermodynamics",s:"16 May",e:"25 May"},{n:6,name:"Chemical Equilibrium",s:"26 May",e:"30 May"},{n:7,name:"Ionic Equilibrium",s:"01 Jun",e:"06 Jun"},{n:8,name:"Electrochemistry",s:"08 Jun",e:"16 Jun"},{n:9,name:"Chemical Kinetics",s:"17 Jun",e:"25 Jun"},{n:10,name:"Solutions",s:"26 Jun",e:"03 Jul"},{n:11,name:"Basics of Organic Chemistry",s:"04 Jul",e:"13 Jul"},{n:12,name:"Hydrocarbons",s:"14 Jul",e:"21 Jul"},{n:13,name:"Haloalkanes & Haloarenes",s:"22 Jul",e:"27 Jul"},{n:14,name:"Alcohols Phenols & Ethers",s:"28 Jul",e:"04 Aug"},{n:15,name:"Aldehydes Ketones & CA",s:"05 Aug",e:"13 Aug"},{n:16,name:"Compounds with Nitrogen",s:"14 Aug",e:"22 Aug"},{n:17,name:"Biomolecules",s:"24 Aug",e:"28 Aug"},{n:18,name:"Practical Organic",s:"29 Aug",e:"03 Sep"},{n:19,name:"Periodic Table & Periodicity",s:"04 Sep",e:"10 Sep"},{n:20,name:"p-Block Elements",s:"11 Sep",e:"19 Sep"},{n:21,name:"d and f Block Elements",s:"21 Sep",e:"29 Sep"},{n:22,name:"Coordination Compounds",s:"30 Sep",e:"08 Oct"},{n:23,name:"Salt Analysis",s:"09 Oct",e:"14 Oct"}

const PHYS=[
  {n:1,name:"Kinematics",s:"13 Apr",e:"18 Apr"},{n:2,name:"Laws of Motion",s:"20 Apr",e:"27 Apr"},{n:3,name:"Work, Energy & Power",s:"28 Apr",e:"04 May"},{n:4,name:"Center of Mass",s:"05 May",e:"12 May"},{n:5,name:"Rotational Dynamics",s:"13 May",e:"23 May"},{n:6,name:"Gravitation",s:"25 May",e:"29 May"},{n:7,name:"Properties of Matter",s:"30 May",e:"04 Jun"},{n:8,name:"Fluid Dynamics",s:"05 Jun",e:"11 Jun"},{n:9,name:"Simple Harmonic Motion",s:"12 Jun",e:"18 Jun"},{n:10,name:"Waves",s:"19 Jun",e:"26 Jun"},{n:11,name:"Thermodynamics 1",s:"27 Jun",e:"03 Jul"},{n:12,name:"Thermodynamics 2",s:"04 Jul",e:"10 Jul"},{n:13,name:"Electrostatics",s:"11 Jul",e:"20 Jul"},{n:14,name:"Capacitance",s:"21 Jul",e:"25 Jul"},{n:15,name:"Current Electricity",s:"27 Jul",e:"03 Aug"},{n:16,name:"Magnetics",s:"04 Aug",e:"12 Aug"},{n:17,name:"Electromagnetic Induction",s:"13 Aug",e:"20 Aug"},{n:18,name:"Alternating Current",s:"21 Aug",e:"26 Aug"},{n:19,name:"Electromagnetic Waves",s:"27 Aug",e:"01 Sep"},{n:20,name:"Optics",s:"02 Sep",e:"14 Sep"},{n:21,name:"Modern Physics",s:"15 Sep",e:"25 Sep"},{n:22,name:"Units & Dimensions",s:"26 Sep",e:"01 Oct"}
];

const TKS=[{k:'theory',l:'Theory'},{k:'module',l:'Module'},{k:'pyq',l:'PYQ'},{k:'revision',l:'Revision'}];
const TMAP={theory:'Theory',module:'Module',pyq:'PYQ',revision:'Revision'};
const KEY='fent_v1';
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MMAP={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};

/* ═══════════════════════════════════════════════
   TEST SCHEDULE (Updated without "— May" text)
═══════════════════════════════════════════════ */
function buildTestSchedule(){
  const tests=[];
  const months=[
    {m:4,label:'May'},{m:5,label:'Jun'},{m:6,label:'Jul'},
    {m:7,label:'Aug'},{m:8,label:'Sep'},{m:9,label:'Oct'}
  ];
  months.forEach(({m,label},mi)=>{
    const sundays=[];
    const d=new Date(2026,m,1);
    while(d.getMonth()===m){if(d.getDay()===0) sundays.push(new Date(d));d.setDate(d.getDate()+1);}
    for(let i=0;i<Math.min(3,sundays.length-1);i++){
      tests.push({id:`m_${mi}_${i}`,name:`Mains Test ${i+1}`,date:sundays[i],type:'mains',month:label,monthIdx:mi});
    }
    if(sundays.length>=1){
      tests.push({id:`a_${mi}`,name:`Advanced Test`,date:sundays[sundays.length-1],type:'adv',month:label,monthIdx:mi});
    }
  });
  return tests;
}
const TESTS=buildTestSchedule();

/* ═══════════════════════════════════════════════
   STATE & FILTERS
═══════════════════════════════════════════════ */
function ld(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return{}}}
function sv(){try{localStorage.setItem(KEY,JSON.stringify(ST))}catch{}}
let ST=ld();
const AF={math:'all',chem:'all',phys:'all'}; 

function gs(s,n){const k=s+'_'+n;if(!ST[k])ST[k]={theory:false,module:false,pyq:false,revision:false};return ST[k]}
function isDone(s,n){const t=gs(s,n);return t.theory&&t.module&&t.pyq&&t.revision}
function tc(s,n){const t=gs(s,n);return[t.theory,t.module,t.pyq,t.revision].filter(Boolean).length}
function isAny(s,n){const t=gs(s,n);return t.theory||t.module||t.pyq||t.revision}

function getTestScore(id){return ST['test_'+id]||null}
function setTestScore(id,data){ST['test_'+id]=data;sv()}
function isTestDone(id){return !!ST['test_'+id]}

/* ═══════════════════════════════════════════════
   DATE UTILS
═══════════════════════════════════════════════ */
function parseDate(str){
  const parts=str.trim().split(' ');
  return new Date(2026,MMAP[parts[1]],parseInt(parts[0]));
}
function startOf(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate())}
function fmtDate(d){return d.getDate()+' '+MONTHS[d.getMonth()]}
function fmtFull(d){return DAYS[d.getDay()]+', '+fmtDate(d)}

/* ═══════════════════════════════════════════════
   TAB SWITCH (Includes Safe Rendering Fix)
═══════════════════════════════════════════════ */
function go(tab,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  
  const activePanel = document.getElementById('p-'+tab);
  activePanel.classList.add('on');
  btn.classList.add('on');
  
  // Safely trigger reflow to guarantee CSS animation renders
  activePanel.querySelectorAll('.ch, .pulse-item-expandable, .test-item').forEach(c => {
     c.style.animation = 'none';
     void c.offsetWidth;
     c.style.animation = '';
  });

  if(tab==='overview'){pulseOffset=0;renderPulse();}
  if(tab==='tests') renderTests();
  if(tab==='ana'){renderAnalytics(); renderDeckAndLog();}
}

function fl(subj,val,btn){
  AF[subj]=val;
  btn.closest('.frow').querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyF(subj);
}
function sr(subj){applyF(subj)}
function applyF(subj){
  const lid={math:'listM',chem:'listC',phys:'listP'}[subj];
  const sid={math:'srM',chem:'srC',phys:'srP'}[subj];
  const q=document.getElementById(sid).value.toLowerCase();
  const f=AF[subj];
  document.getElementById(lid).querySelectorAll('.ch').forEach(el=>{
    const n=parseInt(el.dataset.num),nm=el.dataset.name;
    const done=isDone(subj,n),any=isAny(subj,n);
    let show=true;
    if(f==='done') show=done;
    else if(f==='wip') show=any&&!done;
    if(q&&!nm.includes(q)) show=false;
    el.style.display=show?'':'none';
  });
}

/* ═══════════════════════════════════════════════
   CARD BUILD
═══════════════════════════════════════════════ */
function card(subj,ch,idx){
  const t=gs(subj,ch.n);
  const cnt=tc(subj,ch.n);
  const done=isDone(subj,ch.n);
  const checks=TKS.map(tk=>`<div class="tk${t[tk.k]?' on':''}" data-s="${subj}" data-n="${ch.n}" data-t="${tk.k}" onclick="tick(this, event)"><div class="tb">${t[tk.k]?'✓':''}</div><span class="tl">${tk.l}</span></div>`).join('');
  return `<div class="ch${done?' done-ch':''}" id="c-${subj}-${ch.n}" data-sc="${subj}-${ch.n}" data-num="${ch.n}" data-name="${ch.name.toLowerCase()}" style="animation-delay:${idx*15}ms">
  <div class="ch-hd" onclick="this.closest('.ch').classList.toggle('open')">
    <span class="ch-n">${String(ch.n).padStart(2,'0')}</span>
    <span class="ch-nm">${ch.name}</span>
    <span class="ch-dt">${ch.s}</span>
    <span class="ch-ct" data-sc="${subj}-${ch.n}">${cnt}/4</span>
    <span class="ch-ar">▾</span>
  </div>
  <div class="tg">${checks}</div>
</div>`;
}

function tick(el, e){
  if(e) e.stopPropagation();
  const s=el.dataset.s, n=parseInt(el.dataset.n), t=el.dataset.t;
  const ts=gs(s,n);
  ts[t]=!ts[t];
  
  // Track timestamp: store date when task is checked (remove when unchecked)
  const tsKey=`ts_${s}_${n}_${t}`;
  if(ts[t]){
    if(!ST[tsKey]) ST[tsKey]=new Date().toISOString().split('T')[0]; // YYYY-MM-DD
  } else {
    delete ST[tsKey];
  }
  
  sv();
  
  // Sync globally
  document.querySelectorAll(`.tk[data-s="${s}"][data-n="${n}"][data-t="${t}"]`).forEach(node => {
    node.classList.toggle('on', ts[t]);
    const box = node.querySelector('.tb');
    if(box) {
      box.textContent = ts[t] ? '✓' : '';
      if(ts[t] && node === el){
        box.classList.remove('popping');
        void box.offsetWidth;
        box.classList.add('popping');
      }
    }
  });

  const cnt=tc(s,n);
  const done=isDone(s,n);
  
  // Update Subject Lists
  document.querySelectorAll(`.ch-ct[data-sc="${s}-${n}"]`).forEach(node => node.textContent = cnt+'/4');
  document.querySelectorAll(`.ch[data-sc="${s}-${n}"]`).forEach(node => node.classList.toggle('done-ch', cnt===4));
  
  // Update Pulse Cards in place without collapsing
  const pulseCards = document.querySelectorAll(`.pulse-item-expandable[data-subj="${s}"][data-n="${n}"]`);
  pulseCards.forEach(item => {
    item.classList.toggle('done-ch', done);
    const progTxt = done?'done':cnt>0?cnt+'/4':'';
    const progCls = done?'done':cnt>0?'wip':'';
    const prog = item.querySelector('.pulse-progress');
    if(prog){
        prog.textContent = progTxt;
        prog.className = 'pulse-progress ' + progCls;
    }
  });

  stats();
  
  if(document.getElementById('p-overview').classList.contains('on')) {
      updateWeeklyProgress(); 
  }
  if(document.getElementById('p-ana').classList.contains('on')){ 
      renderAnalytics(); renderDeckAndLog(); 
  }
}

function updateWeeklyProgress() {
  const today=new Date(); today.setHours(0,0,0,0);
  const wStart=new Date(today); wStart.setDate(today.getDate()+pulseOffset*7);
  const wEnd=new Date(wStart); wEnd.setDate(wStart.getDate()+6);

  let wkTotal = 0; let wkDone = 0;
  
  const countChaps = (arr, subj) => {
    arr.forEach(ch => {
      const cS=parseDate(ch.s), cE=parseDate(ch.e);
      if(cS<=wEnd && cE>=wStart) {
        wkTotal += 4;
        const t = gs(subj, ch.n);
        if(t.theory) wkDone++;
        if(t.module) wkDone++;
        if(t.pyq) wkDone++;
        if(t.revision) wkDone++;
      }
    });
  };
  countChaps(MATH, 'math'); countChaps(CHEM, 'chem'); countChaps(PHYS, 'phys');
  
  TESTS.forEach(t => {
    const td=startOf(t.date);
    if(td>=wStart && td<=wEnd) {
      wkTotal += 1;
      if(isTestDone(t.id)) wkDone++;
    }
  });
  
  const wkPct = wkTotal > 0 ? Math.round((wkDone/wkTotal)*100) : 0;
  const fill = document.getElementById('pulseWkBar');
  const text = document.getElementById('pulseWkText');
  if(fill){
    fill.style.width = wkPct + '%';
    fill.classList.toggle('has-progress', wkPct > 0);
  }
  if(text) text.textContent = wkPct + '%';
}

function stats(){
  const mCD=MATH.filter(ch=>isDone('math',ch.n)).length;
  const cCD=CHEM.filter(ch=>isDone('chem',ch.n)).length;
  const pCD=PHYS.filter(ch=>isDone('phys',ch.n)).length;
  const tot=mCD+cCD+pCD;
  const max=MATH.length+CHEM.length+PHYS.length;
  
  document.getElementById('mPct').textContent=Math.round((tot/max)*100||0)+'%';
  document.getElementById('scM').textContent=mCD+' / '+MATH.length;
  document.getElementById('scC').textContent=cCD+' / '+CHEM.length;
  document.getElementById('scP').textContent=pCD+' / '+PHYS.length;
  document.getElementById('bM').textContent=mCD+'/'+MATH.length;
  document.getElementById('bC').textContent=cCD+'/'+CHEM.length;
  document.getElementById('bP').textContent=pCD+'/'+PHYS.length;

  const doneCnt=TESTS.filter(t=>isTestDone(t.id)).length;
  document.getElementById('bT').textContent=doneCnt+'/'+TESTS.length;
}

function updateTotal(type){
  const keys=['phy','chem','math'];
  let sum=0;
  let hasError = false;
  
  keys.forEach(k=>{
    const el=document.getElementById('si_'+k);
    if(el) {
      // Force strip out any non-numeric characters immediately
      el.value = el.value.replace(/[^0-9]/g, '');
      
      if(el.value !== "") {
        let v = parseInt(el.value);
        if (v > activeTestMax) {
          v = activeTestMax;
          el.value = activeTestMax; // Cap it visually
          hasError = true;
        }
        sum += v;
      }
    }
  });

  const errEl = document.getElementById('modalError');
  const submitBtn = document.getElementById('modalSubmit');
  
  if (hasError) {
    errEl.textContent = 'Maximum score per subject is ' + activeTestMax + '.';
    errEl.style.display = 'block';
    // Gentle flash logic for repeated errors
    setTimeout(() => { errEl.style.display = 'none'; }, 2500); 
  }

  const total=type==='mains'?300:360;
  const el=document.getElementById('scoreTotalVal');
  if(el){
    el.textContent=sum+' / '+total;
    el.style.animation='none';void el.offsetWidth;el.style.animation='scoreReveal .2s ease both';
  }
}

function submitScore(){
  const t=TESTS.find(x=>x.id===activeTestId);
  if(!t) return;
  const keys=['phy','chem','math'];
  const scores={};
  let total=0;
  let invalid=false;
  
  keys.forEach(k=>{
    const el=document.getElementById('si_'+k);
    let v=parseInt(el?.value)||0;
    if (v < 0 || v > activeTestMax) invalid = true;
    scores[k]=v;total+=v;
  });
  
  if (invalid) return; // safeguard
  if(total===0){toast('enter at least one score');return;}
  
  const maxTotal=t.type==='mains'?300:360;
  setTestScore(activeTestId,{...scores,total,maxTotal,date:new Date().toISOString()});
  closeModal();
  toast('✓ LOGGED');
  if(document.getElementById('p-tests').classList.contains('on')) renderTests();
  if(document.getElementById('p-overview').classList.contains('on')) renderPulse();
  if(document.getElementById('p-ana').classList.contains('on')){ renderAnalytics(); renderDeckAndLog(); }
}

function closeModal(){
  document.getElementById('modalOverlay').classList.add('hidden');
  activeTestId=null;
}

function renderAnalytics(){
  const el=document.getElementById('anaContent');
  const today=new Date(); today.setHours(0,0,0,0);

  /* ── Base chapter data ── */
  const allSubjs=[...MATH.map(ch=>({s:'math',ch})),...CHEM.map(ch=>({s:'chem',ch})),...PHYS.map(ch=>({s:'phys',ch}))];
  const mDone=MATH.filter(ch=>isDone('math',ch.n)).length;
  const cDone=CHEM.filter(ch=>isDone('chem',ch.n)).length;
  const pDone=PHYS.filter(ch=>isDone('phys',ch.n)).length;
  const totalDone=mDone+cDone+pDone;
  const totalChaps=MATH.length+CHEM.length+PHYS.length;

  /* ── Task type breakdown ── */
  const taskTotals={theory:0,module:0,pyq:0,revision:0};
  allSubjs.forEach(({s,ch})=>{const t=gs(s,ch.n);Object.keys(taskTotals).forEach(k=>{if(t[k])taskTotals[k]++;});});
  const taskMax=allSubjs.length;

  /* ── Test averages in marks ── */
  const doneTests=TESTS.filter(t=>isTestDone(t.id));
  const mainsDone=doneTests.filter(t=>t.type==='mains');
  const advDone=doneTests.filter(t=>t.type==='adv');
  const avgMarks=arr=>arr.length?Math.round(arr.reduce((a,t)=>{const sc=getTestScore(t.id);return a+(sc?sc.total:0);},0)/arr.length):null;
  const mainsAvg=avgMarks(mainsDone);
  const advAvg=avgMarks(advDone);

  /* ── Deadline & backlog ── */
  const allEndDates=allSubjs.map(({ch})=>parseDate(ch.e));
  const finalDeadline=new Date(Math.max(...allEndDates.map(d=>d.getTime())));
  const daysLeft=Math.max(0,Math.round((finalDeadline-today)/(1000*60*60*24)));
  const chapsLeft=totalChaps-totalDone;
  const backlog=allSubjs.filter(({s,ch})=>parseDate(ch.e)<today&&!isDone(s,ch.n));
  const mBack=backlog.filter(({s})=>s==='math').length;
  const cBack=backlog.filter(({s})=>s==='chem').length;
  const pBack=backlog.filter(({s})=>s==='phys').length;

  /* ── Track status logic ── */
  let trackStatus,trackColor,trackDesc;
  if(backlog.length===0&&daysLeft>0){
    trackStatus='On Track';trackColor='var(--c)';trackDesc='All chapters are within schedule.';
  } else if(backlog.length===0&&daysLeft===0){
    trackStatus='Finished';trackColor='var(--c)';trackDesc='Study period complete.';

    trackStatus='Slightly Behind';trackColor='var(--m)';trackDesc=backlog.length+' chapter'+(backlog.length===1?'':'s')+' past due. Manageable.';
  } else {
    trackStatus='Danger Zone';trackColor='var(--red)';trackDesc=backlog.length+' chapters overdue — immediate catch-up required.';
  }

  /* ── Heatmap weekly data ── */
  const heatStart=new Date(2026,3,13);
  const weeks=[];
  let wkPtr=new Date(heatStart);
  while(wkPtr<=finalDeadline){
    const wkE=new Date(wkPtr); wkE.setDate(wkPtr.getDate()+6);

    const isCurrent=wkPtr<=today&&today<=wkE;
    weeks.push({wkStart:new Date(wkPtr),wkEnd:new Date(wkE),wkTotal,wkDone,ratio:wkTotal?wkDone/wkTotal:0,isPast,isCurrent});
    wkPtr.setDate(wkPtr.getDate()+7);

  /* ── Chart score data ── */
  const chartTests=[...mainsDone,...advDone]
    .map(t=>{const sc=getTestScore(t.id);return sc?{...t,sc}:null;})
    .filter(Boolean)
    .sort((a,b)=>new Date(a.sc.date)-new Date(b.sc.date))
    .slice(-14);

  /* ══ Build HTML ══ */
  let html='';

    {l:'Physics',    d:pDone,t:PHYS.length,color:'#908bb0',colorRgb:'144,139,176'}

/* ─── Score Trend Chart (marks-based) ─── */
function buildScoreChart(tests){
  const W=560,H=160,PL=52,PR=16,PT=14,PB=36;
  const plotW=W-PL-PR, plotH=H-PT-PB;
  const N=tests.length;

  // Color and quality logic by marks (per exam type)
  function scoreColor(t){
    const marks=t.sc.total;
    if(t.type==='mains'){
      return marks>=150?'var(--c)':marks>=100?'var(--m)':'var(--red)';
    } else {
      return marks>=100?'var(--c)':marks>=40?'var(--m)':'var(--red)';
    }
  }

  // Determine Y axis scale: max marks across all tests, snapped nicely
  const allMarks=tests.map(t=>t.sc.total);
  const dataMax=Math.max(...allMarks);
  // Make a nice ceiling: round up to nearest 50 or 100
  const yMax=Math.max(dataMax+20, tests.some(t=>t.type==='mains')?300:360);

  // Horizontal zone bands: different for mains vs mixed
  // We'll show advisory lines at key thresholds
  const hasMains=tests.some(t=>t.type==='mains');
  const hasAdv=tests.some(t=>t.type==='adv');
  const zones=[];
  if(hasMains){
    zones.push({mark:150,label:'150 — Good',color:'rgba(107,158,131,.18)'});
    zones.push({mark:100,label:'100 — Mid',color:'rgba(194,163,89,.14)'});
  }
  if(hasAdv && !hasMains){
    zones.push({mark:100,label:'100 — Good',color:'rgba(107,158,131,.18)'});
    zones.push({mark:40,label:'40 — Mid',color:'rgba(194,163,89,.14)'});
  }

  const yToSvg=mark=>PT+(1-mark/yMax)*plotH;

  // Grid lines at 0, half, max and at threshold marks
  const gridMarks=[0];
  if(hasMains){ gridMarks.push(100,150,300); }
  else if(hasAdv){ gridMarks.push(40,100,360); }
  const gridSet=new Set(gridMarks.filter(v=>v<=yMax));

  const pts=tests.map((t,i)=>({
    x:PL+(N>1?i/(N-1):0.5)*plotW,
    y:yToSvg(t.sc.total),
    t
  }));

  // Smooth bezier path
  function bezierPath(pts){
    if(pts.length<2) return pts.map((p,i)=>(i===0?`M${p.x.toFixed(1)},${p.y.toFixed(1)}`:`L${p.x.toFixed(1)},${p.y.toFixed(1)}`)).join(' ');
    let d=`M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
    for(let i=1;i<pts.length;i++){
      const prev=pts[i-1],cur=pts[i];
      const cpX=(prev.x+cur.x)/2;
      d+=` C${cpX.toFixed(1)},${prev.y.toFixed(1)} ${cpX.toFixed(1)},${cur.y.toFixed(1)} ${cur.x.toFixed(1)},${cur.y.toFixed(1)}`;
    }
    return d;
  }
  const lineD=bezierPath(pts);
  const areaD=lineD+` L${pts[N-1].x.toFixed(1)},${(PT+plotH).toFixed(1)} L${pts[0].x.toFixed(1)},${(PT+plotH).toFixed(1)} Z`;

  const gridLines=[...gridSet].map(v=>{
    const gy=yToSvg(v);
    const isThreshold=(hasMains&&(v===100||v===150))||(hasAdv&&!hasMains&&(v===40||v===100));
    return `<line x1="${PL}" y1="${gy.toFixed(1)}" x2="${W-PR}" y2="${gy.toFixed(1)}" 
      stroke="${isThreshold?'rgba(255,255,255,.08)':'rgba(255,255,255,.04)'}" 
      stroke-width="${isThreshold?'1':'1'}" 
      stroke-dasharray="${isThreshold?'3,4':''}"/>
    <text x="${(PL-5).toFixed(1)}" y="${(gy+3.5).toFixed(1)}" text-anchor="end" 
      fill="${isThreshold?'rgba(255,255,255,.28)':'#52525b'}" 
      font-size="${isThreshold?'8':'8'}" 
      font-family="JetBrains Mono,monospace">${v}</text>`;
  }).join('');

  // Zone band fills (below threshold marks)
  const zoneBands=hasMains?`
    <rect x="${PL}" y="${yToSvg(150).toFixed(1)}" width="${plotW}" height="${(yToSvg(100)-yToSvg(150)).toFixed(1)}" fill="rgba(194,163,89,.04)"/>
    <rect x="${PL}" y="${(PT).toFixed(1)}" width="${plotW}" height="${(yToSvg(150)-PT).toFixed(1)}" fill="rgba(107,158,131,.04)"/>
  `:hasAdv?`
    <rect x="${PL}" y="${yToSvg(100).toFixed(1)}" width="${plotW}" height="${(yToSvg(40)-yToSvg(100)).toFixed(1)}" fill="rgba(194,163,89,.04)"/>
    <rect x="${PL}" y="${(PT).toFixed(1)}" width="${plotW}" height="${(yToSvg(100)-PT).toFixed(1)}" fill="rgba(107,158,131,.04)"/>
  `:'';

  const dotsHTML=pts.map((p,i)=>{
    const col=scoreColor(p.t);
    const lbl=p.t.type==='mains'?'M':'A';
    const delay=(0.25+i*0.06).toFixed(2);
    const markVal=p.t.sc.total;
    return `<circle class="chart-dot-anim" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="4"
        fill="${col}" stroke="var(--bg)" stroke-width="2.5"
        style="animation-delay:${delay}s">
        <title>${p.t.name}: ${markVal}/${p.t.sc.maxTotal}</title>
      </circle>
      <text x="${p.x.toFixed(1)}" y="${(PT+plotH+15).toFixed(1)}" text-anchor="middle" 
        fill="#52525b" font-size="8" font-family="JetBrains Mono,monospace" 
        class="chart-dot-anim" style="animation-delay:${delay}s">${lbl}</text>
      <text x="${p.x.toFixed(1)}" y="${(p.y-9).toFixed(1)}" text-anchor="middle" 
        fill="${col}" font-size="9" font-family="JetBrains Mono,monospace" font-weight="400"
        class="chart-dot-anim" style="animation-delay:${(parseFloat(delay)+0.05).toFixed(2)}s">${markVal}</text>`;
  }).join('');

  return `<div class="ana-section">
  <div class="ana-sect-title">Score Trend</div>
  <div class="score-chart-wrap">
  <svg class="score-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
    <defs>
      <linearGradient id="chartGrad2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--t1)" stop-opacity=".06"/>
        <stop offset="100%" stop-color="var(--t1)" stop-opacity="0"/>
      </linearGradient>
      <clipPath id="chartClip"><rect x="${PL}" y="${PT}" width="${plotW}" height="${plotH}"/></clipPath>
    </defs>
    ${zoneBands}
    ${gridLines}
    <g clip-path="url(#chartClip)">
      <path class="chart-area-anim" d="${areaD}" fill="url(#chartGrad2)"/>
      <path class="chart-line-anim" d="${lineD}" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    ${dotsHTML}
  </svg>
  </div>
  <div class="score-chart-legend">
    <div class="score-leg-item"><span class="score-leg-dot" style="background:var(--c)"></span><span>Good ${hasMains&&hasAdv?'M≥150 / A≥100':hasMains?'≥150 marks':'≥100 marks'}</span></div>
    <div class="score-leg-item"><span class="score-leg-dot" style="background:var(--m)"></span><span>Mid ${hasMains&&hasAdv?'M≥100 / A≥40':hasMains?'≥100 marks':'≥40 marks'}</span></div>
    <div class="score-leg-item"><span class="score-leg-dot" style="background:var(--red)"></span><span>Low</span></div>
    <div style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);">M = Mains &nbsp; A = Adv</div>
  </div>
</div>`;
}

/* ─── Study Heatmap (GitHub-style daily grid) ─── */
function buildHeatmap(weeks,today){
  const allSubjs=[...MATH.map(ch=>({s:'math',ch})),...CHEM.map(ch=>({s:'chem',ch})),...PHYS.map(ch=>({s:'phys',ch}))];
  const TK_KEYS=['theory','module','pyq','revision'];

  // Build day → {done, chapters[]} map using actual tick timestamps
  // If a task has a timestamp (ts_s_n_k), credit it to that date.
  // If a task is done but has NO timestamp (old data before this feature), 
  //   credit it to today's date as a fallback.
  const dayMap={};
  const addToDay=(dateKey,chName,subjKey)=>{
    if(!dayMap[dateKey]) dayMap[dateKey]={done:0,chaps:{}};
    dayMap[dateKey].done++;
    if(!dayMap[dateKey].chaps[chName]) dayMap[dateKey].chaps[chName]={name:chName,s:subjKey,count:0};
    dayMap[dateKey].chaps[chName].count++;
  };

  const todayKey=today.toISOString().split('T')[0];
  allSubjs.forEach(({s,ch})=>{
    const taskState=gs(s,ch.n);
    TK_KEYS.forEach(k=>{
      if(taskState[k]){
        const tsKey=`ts_${s}_${ch.n}_${k}`;
        const dateKey=ST[tsKey]||todayKey; // fallback to today for legacy data
        addToDay(dateKey,ch.name,s);
      }
    });
  });

  // Date range: Apr 13 → Oct 14 2026
  const startDate=new Date(2026,3,13);
  const endDate=new Date(2026,9,14);

  // Build weeks grid starting from Sunday before startDate
  const gridStart=new Date(startDate);
  gridStart.setDate(gridStart.getDate()-gridStart.getDay()); // back to Sunday

  const allDays=[];
  const ptr=new Date(gridStart);
  while(ptr<=endDate){
    const d=new Date(ptr);
    const inRange=d>=startDate && d<=endDate;
    const isPast=d<today;
    const isToday=d.toDateString()===today.toDateString();
    // Use YYYY-MM-DD format matching timestamp keys
    const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    const dayData=dayMap[key]||{done:0,chaps:{}};
    const chapters=Object.values(dayData.chaps);
    allDays.push({d,inRange,isPast,isToday,key,done:dayData.done,chapters,month:d.getMonth()});
    ptr.setDate(ptr.getDate()+1);
  }

  // Max done in a single day (for relative intensity)
  const maxDay=Math.max(1,...allDays.filter(d=>d.inRange).map(d=>d.done));

  // Group into columns (weeks)
  const cols=[];
  for(let i=0;i<allDays.length;i+=7) cols.push(allDays.slice(i,i+7));

  // Month tab list
  const monthsInRange=[];
  const seenM=new Set();
  allDays.filter(d=>d.inRange).forEach(d=>{
    if(!seenM.has(d.month)){seenM.add(d.month);monthsInRange.push({m:d.month,label:MONTHS[d.month]});}
  });

  const CELL=13, GAP=3;
  const dayLabels=['S','M','T','W','T','F','S'];

  // Cell color — based on task count that day
  const cellColor=(day)=>{
    if(!day.inRange) return 'rgba(255,255,255,0.0)';
    if(!day.isPast && !day.isToday) return 'rgba(255,255,255,0.04)';
    if(day.done===0) return 'rgba(255,255,255,0.04)';
    const r=day.done/maxDay; // relative intensity
    if(r<0.15) return 'rgba(194,163,89,0.3)';
    if(r<0.35) return 'rgba(194,163,89,0.55)';
    if(r<0.6)  return 'rgba(107,158,131,0.5)';
    if(r<0.85) return 'rgba(107,158,131,0.75)';
    return 'rgba(107,158,131,0.95)';
  };

  const hmId='hm'+Date.now();

  // Month label positions
  let monthPos=[];
  let lastMon=-1;
  cols.forEach((col,ci)=>{
    const mon=col[0]?.month;
    if(mon!==undefined && mon!==lastMon && col.some(d=>d.inRange)){
      if(monthsInRange.find(m=>m.m===mon)) monthPos.push({ci,label:MONTHS[mon],m:mon});
      lastMon=mon;
    }
  });

  const totalW=cols.length*(CELL+GAP);

  return `<div class="ana-section" id="${hmId}wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;">
    <span class="ana-sect-title" style="margin-bottom:0;">Study Heatmap</span>
    <div style="display:flex;gap:6px;flex-wrap:wrap;" id="${hmId}tabs">
      <button class="hm-month-tab hm-tab-on" onclick="hmFilter('${hmId}','all',this)">All</button>
      ${monthsInRange.map(({m,label})=>`<button class="hm-month-tab" onclick="hmFilter('${hmId}','${m}',this)">${label}</button>`).join('')}
    </div>
  </div>

  <div class="heatmap-scroll-wrap">
    <div style="display:flex;gap:${GAP}px;">
      <!-- Day labels -->
      <div style="display:flex;flex-direction:column;gap:${GAP}px;margin-right:2px;padding-top:20px;">
        ${dayLabels.map((l,i)=>`<div style="width:10px;height:${CELL}px;display:flex;align-items:center;font-size:8px;color:rgba(255,255,255,0.2);font-family:'JetBrains Mono',monospace;flex-shrink:0;">${i%2===1?l:''}</div>`).join('')}
      </div>
      <!-- Grid -->
      <div style="position:relative;">
        <!-- Month labels row -->
        <div style="position:relative;height:18px;margin-bottom:3px;min-width:${totalW}px;">
          ${monthPos.map(mp=>`<span style="position:absolute;left:${mp.ci*(CELL+GAP)}px;font-size:8.5px;color:rgba(255,255,255,0.28);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.06em;font-weight:500;">${mp.label}</span>`).join('')}
        </div>
        <!-- Cells -->
        <div style="display:flex;gap:${GAP}px;" id="${hmId}grid">
          ${cols.map((col,ci)=>`
          <div style="display:flex;flex-direction:column;gap:${GAP}px;">
            ${col.map((day,ri)=>{
              const tip=day.inRange?
                (MONTHS[day.month]+' '+day.d.getDate()+': '+(day.done>0?(day.done+' task'+(day.done!==1?'s':'')+' done'+(day.chapters.length?' — '+day.chapters.map(c=>c.name).join(', '):'')):'nothing recorded'))
                :'';
              const border=day.isToday?'1px solid rgba(255,255,255,0.5)':'1px solid transparent';
              return `<div class="hm-cell" data-month="${day.month}" data-inrange="${day.inRange?1:0}"
                style="width:${CELL}px;height:${CELL}px;background:${cellColor(day)};border:${border};border-radius:3px;cursor:${day.inRange&&day.done>0?'pointer':'default'};"
                title="${tip}"
                onclick="hmDayClick(this,'${day.key}',${JSON.stringify(day.chapters).replace(/"/g,'&quot;')})"></div>`;
            }).join('')}
          </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Detail panel on click -->
    <div id="${hmId}detail" style="display:none;margin-top:14px;padding:14px 16px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;animation:fadeUp .2s var(--ease) both;">
      <div id="${hmId}detailContent"></div>
    </div>

    <!-- Legend -->
    <div style="display:flex;align-items:center;gap:4px;margin-top:12px;flex-wrap:wrap;">
      <span style="font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:300;margin-right:2px;">Less</span>
      ${['rgba(255,255,255,0.04)','rgba(194,163,89,0.3)','rgba(194,163,89,0.55)','rgba(107,158,131,0.75)','rgba(107,158,131,0.95)'].map(c=>`<div style="width:${CELL}px;height:${CELL}px;background:${c};border-radius:3px;flex-shrink:0;"></div>`).join('')}
      <span style="font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:300;margin-left:2px;">More</span>
      <span style="margin-left:auto;font-size:9px;color:var(--t3);opacity:.4;font-family:'JetBrains Mono',monospace;">Apr – Oct 2026</span>
    </div>
  </div>
</div>`;
}

/* ─── Syllabus Tracker + Backlog ─── */
function buildTrackerSection(backlog,mBack,cBack,pBack,daysLeft,chapsLeft,trackStatus,trackColor,trackDesc,today){
  const subjRows=[
    {l:'Mathematics',count:mBack,total:MATH.length,c:'var(--m)'},
    {l:'Chemistry',count:cBack,total:CHEM.length,c:'var(--c)'},
    {l:'Physics',count:pBack,total:PHYS.length,c:'var(--p)'}
  ].filter(s=>s.count>0);

  let html=`<div class="ana-section">
  <div class="ana-sect-title">Syllabus Tracker</div>
  <div class="track-card" style="border-color:${trackColor}22;background:${trackColor}09">
    <div class="track-card-left">
      <div class="track-badge" style="color:${trackColor}">
        <div class="track-badge-dot" style="background:${trackColor}"></div>
        ${trackStatus}
      </div>
      <div class="track-desc">${trackDesc}</div>
    </div>
    <div class="track-stats-row">
      <div class="track-stat-item">
        <div class="track-stat-num">${daysLeft}</div>
        <div class="track-stat-lbl">days left</div>
      </div>
      <div class="track-stat-div"></div>
      <div class="track-stat-item">
        <div class="track-stat-num">${chapsLeft}</div>
        <div class="track-stat-lbl">remaining</div>
      </div>
      <div class="track-stat-div"></div>
      <div class="track-stat-item">
        <div class="track-stat-num" style="color:${backlog.length?'var(--red)':'var(--c)'}">${backlog.length}</div>
        <div class="track-stat-lbl">overdue</div>
      </div>
    </div>
  </div>`;

  if(backlog.length>0){
    html+=`<div style="margin-top:22px">
    <div style="font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:14px">
      Backlog — ${backlog.length} overdue
    </div>`;

    if(subjRows.length>0){
      html+=`<div style="display:flex;flex-direction:column;gap:9px;margin-bottom:16px">
        ${subjRows.map(s=>{
          const pct=Math.round(s.count/s.total*100);
          return `<div style="display:flex;align-items:center;gap:12px;">
            <span style="font-size:11px;color:var(--t2);width:82px;flex-shrink:0;">${s.l}</span>
            <div style="flex:1;height:2px;background:var(--s3);border-radius:99px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:${s.c};border-radius:99px;transition:width 1s var(--ease)"></div>
            </div>
            <span style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--t3);white-space:nowrap;font-weight:300;">${s.count} overdue</span>
          </div>`;
        }).join('')}
      </div>`;
    }

    html+=`<div style="display:flex;flex-direction:column;gap:3px;">
      ${backlog.slice(0,10).map(({s,ch})=>{
        const endD=parseDate(ch.e);
        const daysOvr=Math.max(0,Math.round((today.getTime()-endD.getTime())/(864e5)));
        const col=s==='math'?'var(--m)':s==='chem'?'var(--c)':'var(--p)';
        const tag={math:'MTH',chem:'CHM',phys:'PHY'}[s];
        return `<div class="backlog-ch-item">
          <div style="width:4px;height:4px;border-radius:50%;background:${col};flex-shrink:0;"></div>
          <span class="backlog-ch-name">${ch.name}</span>
          <span class="backlog-overdue-tag">+${daysOvr}d</span>
          <span class="backlog-subj-tag">${tag}</span>
        </div>`;
      }).join('')}
      ${backlog.length>10?`<div style="font-size:10px;color:var(--t3);text-align:center;padding:8px 0;opacity:.6">+${backlog.length-10} more overdue</div>`:''}
    </div></div>`;
  } else {
    html+=`<div style="font-size:11px;color:var(--t3);text-align:center;padding:18px 0;margin-top:6px;opacity:.8">No overdue chapters — schedule is clear.</div>`;
  }

  html+='</div>';
  return html;
}

/* ─── Heatmap interaction ─── */
function hmFilter(id, monthVal, btn){
  // Update tab active state
  document.getElementById(id+'tabs').querySelectorAll('.hm-month-tab').forEach(b=>b.classList.remove('hm-tab-on'));
  btn.classList.add('hm-tab-on');
  // Filter cells
  document.getElementById(id+'grid').querySelectorAll('.hm-cell').forEach(cell=>{
    const inRange=cell.dataset.inrange==='1';
    if(!inRange){cell.style.opacity='0.3';return;}
    if(monthVal==='all'){cell.style.opacity='1';cell.style.transform='scale(1)';}
    else{
      const match=cell.dataset.month===monthVal;
      cell.style.opacity=match?'1':'0.18';
      cell.style.transform=match?'scale(1)':'scale(0.85)';
    }
  });
  // Hide detail panel on filter change
  const det=document.getElementById(id+'detail');
  if(det) det.style.display='none';
}

function hmDayClick(el,dateKey,chapters){
  const wrap=el.closest('.ana-section');
  if(!wrap) return;
  const det=wrap.querySelector('[id$="detail"]');
  const cont=wrap.querySelector('[id$="detailContent"]');
  if(!det||!cont) return;

  const parts=dateKey.split('-');
  const mo=parseInt(parts[1])-1, dy=parseInt(parts[2]), yr=parseInt(parts[0]);
  const dateLabel=MONTHS[mo]+' '+dy+', '+yr;

  if(!chapters||chapters.length===0){det.style.display='none';return;}

  const rows=chapters.map(c=>{
    const col=c.s==='math'?'var(--m)':c.s==='chem'?'var(--c)':'var(--p)';
    const tag={math:'MTH',chem:'CHM',phys:'PHY'}[c.s];
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1);">
      <div style="width:4px;height:4px;border-radius:50%;background:${col};flex-shrink:0;"></div>
      <span style="flex:1;font-size:12px;color:var(--t1);">${c.name}</span>
      <span style="font-size:9px;color:${col};font-family:'JetBrains Mono',monospace;">${c.count} task${c.count!==1?'s':''} done</span>
      <span style="font-size:9px;padding:2px 7px;border-radius:4px;background:var(--s3);color:var(--t3);">${tag}</span>
    </div>`;
  }).join('');

  cont.innerHTML=`
    <div style="font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--t2);margin-bottom:10px;">${dateLabel}</div>
    ${rows}
  `;
  det.style.display='block';
  det.style.animation='none';void det.offsetWidth;det.style.animation='fadeUp .2s var(--ease) both';
}
